<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="KIRO Wallet lets users open a secure digital wallet, view live crypto prices, and manage wallet activity from the web or mobile app.">
  <meta name="theme-color" content="#111827">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="KIRO Wallet">
  <meta property="og:description" content="Open your KIRO Wallet from the web and manage crypto wallet activity securely.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="KIRO Wallet">
  <meta name="twitter:description" content="Open your KIRO Wallet from the web and manage crypto wallet activity securely.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KIRO Wallet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>KIRO Wallet</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #111827;
    }

    #kiro-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
    }

    #kiro-loading img {
      width: min(76vw, 560px);
      max-height: 72vh;
      object-fit: contain;
    }

    #kiro-loading.fade-out {
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease;
    }
  </style>
</head>
<body>
  <div id="kiro-loading" aria-label="KIRO Wallet loading">
    <img src="assets/assets/images/logo.png" alt="KIRO Wallet">
  </div>
  <noscript>
    <main>
      <h1>KIRO Wallet</h1>
      <p>KIRO Wallet is a secure digital wallet experience for managing crypto wallet activity and viewing live market prices.</p>
      <p>Please enable JavaScript to open the wallet.</p>
    </main>
  </noscript>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    function hideKiroLoading() {
      var loader = document.getElementById('kiro-loading');
      if (!loader) return;
      loader.classList.add('fade-out');
      window.setTimeout(function () {
        loader.remove();
      }, 320);
    }

    window.addEventListener('flutter-first-frame', hideKiroLoading);
    window.setTimeout(hideKiroLoading, 12000);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
